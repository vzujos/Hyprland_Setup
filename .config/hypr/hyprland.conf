
# #######################################################################################
# HYPRLAND CONFIG.
# #######################################################################################

# https://wiki.hyprland.org/Configuring/


################
### MONITORS ###
################

monitor = eDP-1, 1366x768@60.06, auto, 1 # Ajustar segun PC
monitor = , prefered, auto, 1
# monitor = , addreserved, 0, 0, 0, 0


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = nm-applet &
exec-once = waybar & swaync & hypridle & hyprpaper
#exec-once = swww-daemon # hyprpaper
#exec-once = swww img ~/.config/hypr/theme/wallpaper1.jpg
# tambien hay exec, exec-shutdown

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = HYPRLAND_TRACE,0
env = AQ_TRACE,0

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

#env = GTK_THEME,
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_THEME,Hypr-Bibata-Modern
env = HYPRCURSOR_SIZE,20

#env = GBM_BACKEND,nvidia-drm
#env = __GLX_VENDOR_LIBRARY_NAME,nvidia
#env = LIBVA_DRIVER_NAME,nvidia
#env = __GL_GSYNC_ALLOWED,
#env = __GL_VRR_ALLOWED,0


###############
### SOURCES ###
###############

source = ~/.config/hypr/myColors.conf
source = ~/.config/hypr/myAnimations.conf
source = ~/.config/hypr/myBinds.conf
source = ~/.config/hypr/myWindowRules.conf


#############
### INPUT ###
#############

input {
    kb_layout = latam,gr
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1
    sensitivity = 0 # [-1.0 - 1.0], 0 means standard
    # natural_scroll = true # ajustado en touchpad

    touchpad {
        natural_scroll = true
        tap-to-click = false # para desactivar primary selectrion
    }
}

#gestures {
#    workspace_swipe = true # 3 dedos
#}


##############
### GROUPS ###
##############

group {
    auto_group = true
}
